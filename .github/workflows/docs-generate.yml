name: docs-generate

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install devf
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Generate docs
        run: devf docs generate --window 14

      - name: Upload generated docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: devf-generated-docs
          path: docs/generated/
