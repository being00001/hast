name: docs-generate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install devf
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Generate docs
        run: devf docs generate --window 14

      - name: Sync vault and enforce link integrity
        run: devf docs sync-vault --check-links --strict

      - name: Upload generated docs artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: devf-generated-docs
          path: docs/generated/
          if-no-files-found: ignore

      - name: Upload knowledge vault artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: devf-knowledge-vault
          path: .knowledge/
          if-no-files-found: ignore
