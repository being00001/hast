name: quality-gates

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  precommit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install quality dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run pre-commit (commit stage)
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Run pre-commit (push stage)
        run: pre-commit run --all-files --hook-stage pre-push --show-diff-on-failure
